<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghuswork</title>
    <link rel="icon" type="image/svg+xml" href="./assets/icons/logo.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="navbar-container">
      <div class="container">
        <nav class="navbar">
          <div class="logo">
            <img src="./assets/icons/logo.svg" alt="Mangalam logo" />
          </div>
          <div class="menu">
            <a href="#">About Us</a>
            <select id="products">
              <option>Products</option>
              <option>Wires</option>
              <option>Coils</option>
              <option>Pipes</option>
            </select>
            <button class="contact-btn">Contact Us</button>
          </div>
        </nav>
      </div>
    </header>

    <nav class="breadcrumb" id="breadcrumb"></nav>

    <main>
      <section class="hero">
        <div class="container">
        <div class="product-details-container">
          <div class="carousal"></div>
          <div class="product-details">
            <div class="badges"></div>
            <h1>Premium HDPE Pipes & Coils for Modern Infrastructure</h1>
            <ul class="features"></ul>

            <div class="price-card"></div>

            <div class="cta-buttons"></div>
          </div>
        </div>
        </div>
      </section>
      <section class="banner">
        <div class="container">
          <div class="banner-content">Trusted by Hundreds of Companies Globally</div>
          <div class="company-logos"></div>
        </div>
      </section>
      <section class="specifications-container"><div class="container"></div></section>
      <section class="features-cards"></section>
      <section class="faq"><div class="container"></div></section>
      <section class="applications"><div class="container"></div></section>
      <section class="process"><div class="container"></div></section>
      <section class="testimonials"><div class="container"></div></section>
      <section class="portfolio"><div class="container"></div></section>
      <section class="resources"><div class="container"></div></section>
      <section class="contact-us"><div class="container"></div></section>
    </main>

    <footer class="footer"><div class="container"></div></footer>

    <script src="script.js"></script>
  </body>
</html>
